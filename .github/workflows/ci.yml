name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs; let every main commit complete so trunk
  # signal is unambiguous (a cancelled run can't prove the commit is green).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Blocking gate — must pass to merge. All four quality gates enforced here
  # (lint, test, build, typecheck). CI build is a smoke test; Netlify rebuilds
  # from source on its own hook.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Verify google-auth-library dedupe
        # Guard against a future googleapis bump silently re-splitting
        # google-auth-library, which re-introduces the ts2322/2769 overload
        # cascade cleared in #86. Fails loudly if more than one distinct
        # version resolves. (Count distinct versions, not install paths —
        # the same version may legitimately appear at multiple tree positions
        # once npm dedupes to a single resolved copy.)
        run: |
          versions=$(npm ls google-auth-library --all --json \
            | jq -r '[.. | objects | select(has("google-auth-library")) | ."google-auth-library".version] | unique')
          echo "google-auth-library versions: $versions"
          count=$(echo "$versions" | jq 'length')
          if [ "$count" -ne 1 ]; then
            echo "Expected 1 distinct google-auth-library version, found $count"
            npm ls google-auth-library --all
            exit 1
          fi
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  # Blocking gate member — type errors fail the run. The codebase previously
  # carried 26 pre-existing type errors (auth/payments/calendar/emails) that
  # predated CI; cleared in #86. This job now blocks merges alongside `build`.
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
