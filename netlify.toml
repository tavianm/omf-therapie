[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[dev]
  framework = "astro"

# Legacy section-route redirects (301 permanent)
[[redirects]]
  from = "/Tarifs"
  to = "/#pricing"
  status = 301

[[redirects]]
  from = "/Services"
  to = "/services/therapie-individuelle"
  status = 301

[[redirects]]
  from = "/About"
  to = "/a-propos"
  status = 301

[[redirects]]
  from = "/Process"
  to = "/#process"
  status = 301

[[redirects]]
  from = "/Formations"
  to = "/#qualifications"
  status = 301