[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # ---------------------------------------------------------------------------
  # Variables d'environnement requises
  # (à configurer dans le dashboard Netlify — NE PAS committer de valeurs ici)
  # ---------------------------------------------------------------------------
  # SUPABASE_URL                  — URL du projet Supabase
  # SUPABASE_ANON_KEY             — Clé publique Supabase (client anon)
  # SUPABASE_SERVICE_ROLE_KEY     — Clé service_role Supabase (server-side uniquement)
  #
  # BETTER_AUTH_SECRET            — Secret de signature Better Auth
  # BETTER_AUTH_URL               — URL publique du site (ex. https://omf-therapie.fr)
  #
  # GOOGLE_SERVICE_ACCOUNT_EMAIL  — Email du compte de service Google Calendar
  # GOOGLE_PRIVATE_KEY            — Clé privée RSA du compte de service (PEM)
  # GOOGLE_CALENDAR_ID            — ID du calendrier Google à synchroniser
  #
  # RESEND_API_KEY                — Clé API Resend pour l'envoi d'emails
  # RESEND_FROM_EMAIL             — Adresse expéditeur (ex. OMF Thérapie <contact@omf-therapie.fr>)
  #
  # STRIPE_SECRET_KEY             — Clé secrète Stripe (sk_live_… ou sk_test_…)
  # STRIPE_WEBHOOK_SECRET         — Secret de signature des webhooks Stripe (whsec_…)
  # STRIPE_PUBLISHABLE_KEY        — Clé publique Stripe (pk_live_… ou pk_test_…)
  #
  # ADMIN_EMAIL                   — Email de la thérapeute (destinataire des formulaires)
  #
  # GOOGLE_BUSINESS_URL           — Lien Google Business Profile (optionnel)
  # PAGES_JAUNES_URL              — Lien Pages Jaunes (optionnel)
  # PSYCHOLOGUE_NET_URL           — Lien profil Psychologue.net (optionnel)

[dev]
  framework = "astro"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://m.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.stripe.com https://*.supabase.co https://resend.com https://api.resend.com https://www.googleapis.com https://accounts.google.com; frame-src https://www.google.com https://maps.google.com https://js.stripe.com; frame-ancestors 'none'"

# Legacy section-route redirects (301 permanent)
[[redirects]]
  from = "/Tarifs"
  to = "/#pricing"
  status = 301

[[redirects]]
  from = "/Services"
  to = "/services/therapie-individuelle"
  status = 301

[[redirects]]
  from = "/About"
  to = "/a-propos"
  status = 301

[[redirects]]
  from = "/Process"
  to = "/#process"
  status = 301

[[redirects]]
  from = "/Formations"
  to = "/#qualifications"
  status = 301

# ---------------------------------------------------------------------------
# Note : routes /api/* (stripe-webhook, contact, rendez-vous…)
# ---------------------------------------------------------------------------
# Le site utilise @astrojs/netlify avec output: 'hybrid'.
# L'adaptateur Netlify déploie automatiquement chaque fichier
# src/pages/api/*.ts (avec prerender = false) comme une Netlify Function
# sous /.netlify/functions/. Les URLs /api/* sont résolues nativement
# par Astro — AUCUN redirect manuel vers /.netlify/functions/ n'est requis.
