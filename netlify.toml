[build]
  # PUBLIC_COMMIT_REF surfaces Netlify's auto-injected COMMIT_REF (git SHA) to
  # the client bundle. Astro only exposes vars prefixed with PUBLIC_ to client
  # code, so without this the browser canary emits `deploy: unknown` (the SHA
  # never reaches the SDK). Local dev: COMMIT_REF unset → empty → fallback to
  # 'unknown' (acceptable — no real SHA in dev).
  command = "PUBLIC_COMMIT_REF=$COMMIT_REF npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # ---------------------------------------------------------------------------
  # Variables d'environnement requises
  # (à configurer dans le dashboard Netlify — NE PAS committer de valeurs ici)
  # Certaines variables diffèrent entre prod et staging/preview — les configurer
  # avec "Add a new scope" dans Netlify : production vs deploy-preview.
  # ---------------------------------------------------------------------------
  # SUPABASE_DATABASE_URL         — URL REST du projet Supabase (differ prod/staging)
  # SUPABASE_ANON_KEY             — Clé publique Supabase (differ prod/staging)
  # SUPABASE_SERVICE_ROLE_KEY     — Clé service_role Supabase (differ prod/staging)
  # DATABASE_URL                  — Connexion PostgreSQL (pooler Supavisor recommandé, alternative directe) pour BetterAuth (differ prod/staging)
  # SUPABASE_CA_CERT              — Certificat racine Supabase (PEM) pour vérification TLS (même certificat prod/staging ; scope par contexte requis)
  #
  # BETTER_AUTH_SECRET            — Secret de signature Better Auth
  # BETTER_AUTH_URL               — URL publique du site (differ prod/staging)
  #
  # GOOGLE_SERVICE_ACCOUNT_EMAIL  — Email du compte de service Google Calendar
  # GOOGLE_PRIVATE_KEY            — Clé privée RSA du compte de service (PEM)
  # GOOGLE_CALENDAR_ID            — ID du calendrier Google à synchroniser
  #
  # RESEND_API_KEY                — Clé API Resend pour l'envoi d'emails
  # RESEND_FROM_EMAIL             — Adresse expéditeur (ex. OMF Thérapie <contact@omf-therapie.fr>)
  #
  # STRIPE_SECRET_KEY             — sk_live_… (prod) ou sk_test_… (staging) — differ prod/staging
  # STRIPE_WEBHOOK_SECRET         — Secret de signature des webhooks Stripe — differ prod/staging
  # STRIPE_PUBLISHABLE_KEY        — pk_live_… (prod) ou pk_test_… (staging) — differ prod/staging
  # STRIPE_SUCCESS_URL            — URL page merci — differ prod/staging
  #
  # ADMIN_EMAIL                   — Email de la thérapeute (destinataire des formulaires)
  #
  # GOOGLE_BUSINESS_URL           — Lien Google Business Profile (optionnel)
  # PAGES_JAUNES_URL              — Lien Pages Jaunes (optionnel)
  # PSYCHOLOGUE_NET_URL           — Lien profil Psychologue.net (optionnel)
  #
  # PUBLIC_GA4_ID                 — Tracking ID Google Analytics 4 (ex. G-XXXXXXXXXX)
  #                                 Préfixe PUBLIC_ requis pour exposition côté client (Astro)
  # PUBLIC_SENTRY_DSN             — DSN Sentry (error tracking) — differ prod/staging
  #                                 Préfixe PUBLIC_ requis pour exposition côté client (Astro)
  #                                 Format: https://<key>@o<orgId>.ingest.<region>.sentry.io/<projectId>
  #                                 (region = us | de | … dépend de l'org Sentry)
  #                                 Optionnel : si absent, le SDK reste inerte (logs console.* seuls)
  #                                 Configurer DEUX scopes dans le dashboard :
  #                                   Production → DSN projet prod
  #                                   Deploy previews → DSN projet staging (voir INFRA.md §7.4)
  #
  # COMMIT_REF, CONTEXT            — Injectés automatiquement par Netlify (non configurés par l'opérateur).
  #                                 COMMIT_REF = SHA du commit (utilisé par le canary serveur).
  #                                 PUBLIC_COMMIT_REF = même SHA, exposé au bundle client (le canary
  #                                 browser en a besoin — Astro ne expose que les vars préfixées PUBLIC_).
  #                                 CONTEXT = "production" | "deploy-preview" | "branch-deploy".

# ---------------------------------------------------------------------------
# Contextes de déploiement — variables non-sensibles par contexte
# Les variables sensibles (clés API, secrets) sont gérées dans le dashboard
# Netlify avec le scope "production" / "deploy-preview" sur chaque variable.
# ---------------------------------------------------------------------------

[context.production]
[context.production.environment]
    BETTER_AUTH_URL = "https://omf-therapie.fr"
    STRIPE_SUCCESS_URL = "https://omf-therapie.fr/rdv/merci/?source=payment-success"

# Les previews (branches + PRs) pointent vers Supabase staging
# Les variables sensibles staging sont configurées dans le dashboard Netlify
# avec le scope "deploy-preview"

[context.deploy-preview.environment]
# PUBLIC_SENTRY_DSN is set via the Netlify dashboard (deploy-preview scope)
# so staging events go to a separate Sentry project. See docs/INFRA.md §7.4.

[dev]
  framework = "astro"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # connect-src note for Sentry (#75):
    #   The browser SDK POSTs envelopes to the Sentry ingest host. The host is
    #   region-specific (here EU: oNNNN.ingest.de.sentry.io) and has 3 DNS
    #   labels, so `*.sentry.io` is INSUFFICIENT (CSP wildcards match exactly
    #   one DNS label). The exact host must be allowlisted in connect-src.
    #   The org id is stable per Sentry org, so prod and deploy-preview (same
    #   org, different project id) share the same ingest host. If the Sentry
    #   org is ever moved to another region, update the host here AND in
    #   docs/INFRA.md §7.2.
    #   Alternative: set `tunnel: '/sentry-tunnel/'` in the client init and
    #   proxy the request — everything stays under connect-src 'self'. The
    #   server SDK is unaffected (server-side fetch bypasses the browser CSP).
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://js.stripe.com https://m.stripe.com https://www.googletagmanager.com cdn-cookieyes.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.stripe.com https://*.supabase.co https://resend.com https://api.resend.com https://www.googleapis.com https://accounts.google.com https://www.google-analytics.com https://*.analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com https://stats.g.doubleclick.net/ https://o4511756155617280.ingest.de.sentry.io *.cookieyes.com cdn-cookieyes.com; worker-src 'self' blob:; frame-src 'self' https://www.google.com https://maps.google.com https://js.stripe.com; frame-ancestors 'none'"

# Legacy section-route redirects (301 permanent)
[[redirects]]
  from = "/Tarifs"
  to = "/#pricing"
  status = 301

[[redirects]]
  from = "/Services"
  to = "/services/therapie-individuelle/"
  status = 301

[[redirects]]
  from = "/About"
  to = "/a-propos/"
  status = 301

[[redirects]]
  from = "/Process"
  to = "/#process"
  status = 301

[[redirects]]
  from = "/Formations"
  to = "/#qualifications"
  status = 301

# ---------------------------------------------------------------------------
# Note : routes /api/* (stripe-webhook, contact, rendez-vous…)
# ---------------------------------------------------------------------------
# Le site utilise @astrojs/netlify avec output: 'static'.
# L'adaptateur Netlify déploie automatiquement chaque fichier
# src/pages/api/*.ts (avec prerender = false) comme une Netlify Function
# sous /.netlify/functions/. Les URLs /api/* sont résolues nativement
# par Astro — AUCUN redirect manuel vers /.netlify/functions/ n'est requis.
