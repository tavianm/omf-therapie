        - generic [ref=e59]:
          - img "Oriane Montabonnet - Thérapeute" [ref=e61]
          - generic [ref=e62]:
            - heading "Ma Mission" [level=3] [ref=e63]
            - paragraph [ref=e64]: Les émotions, les pensées et les relations façonnent notre équilibre intérieur. Parfois, elles deviennent sources de doutes, de tensions ou de souffrance. Vous n'avez pas à traverser cela seul(e).
            - paragraph [ref=e65]: À travers la thérapie, je vous accompagne avec écoute et bienveillance pour vous aider à mieux comprendre ce que vous traversez et à retrouver un équilibre apaisé. Anxiété, estime de soi, troubles alimentaires, difficultés relationnelles… Chaque parcours est unique, et mon approche s'adapte à vos besoins, à votre rythme.
            - paragraph [ref=e66]: Ici, vous trouverez un espace sécurisant, où vous pourrez déposer vos pensées, explorer des solutions concrètes et avancer vers une vie plus sereine et alignée avec vous-même.
            - paragraph [ref=e67]: Vous méritez d'aller mieux. Si vous ressentez le besoin d'être accompagné(e), je serai ravie de vous guider sur ce chemin. N'hésitez pas à me contacter pour en savoir plus ou prendre rendez-vous.
            - heading "Mon Parcours" [level=3] [ref=e68]
            - paragraph [ref=e69]: Passionnée par le bien-être psychologique, j'accompagne celles et ceux qui traversent des périodes de doute, d'émotions intenses ou de questionnements, en leur offrant un espace bienveillant pour mieux comprendre et apaiser ce qu'ils vivent.
            - paragraph [ref=e70]: Diplômée en psychologie, spécialisée en TCCE, thérapie conjugale et familiale, ainsi qu'en nutrition et psyché, j'adopte une approche globale pour aider chacun à retrouver équilibre émotionnel, relations apaisées et bien-être physique.
            - paragraph [ref=e71]: Mon objectif ? Vous aider à retrouver sérénité, confiance et harmonie, à travers des solutions adaptées à votre histoire et à vos besoins.
        - generic [ref=e72]:
