# .claude/stack.yml — dev-core stack configuration
# COMMIT this file — it declares project stack conventions (paths, commands,
# formatter, test runner). No secrets go here; only `.env` stays gitignored.
#
# stack.yml.example remains as a reference template for fresh clones.

schema_version: "1.0"

# Runtime and package manager used for all commands
runtime: node                      # bun | node | deno
package_manager: npm               # bun | npm | pnpm | yarn

backend:
  framework: none                  # Astro SSR handles API routes (src/pages/api/*) — no separate backend
  orm: none                        # raw pg + @supabase/supabase-js + better-auth
  path: src/pages/api              # SSR API endpoints, relative to project root

frontend:
  framework: none                  # Astro (not in nestjs/next/remix/etc enum)
  path: .                          # single-app project, root
  ui_package: ""                   # no shared UI package (non-monorepo)
  ui_src: ""

shared:
  types: ""                        # non-monorepo — no shared packages
  ui: ""
  config: ""

build:
  orchestrator: none               # single app, no turbo/nx
  orchestrator_config: ""
  formatter: eslint                # biome | eslint | rome | none
  formatter_config: eslint.config.js
  formatter_fix_cmd: "npx eslint . --fix"

testing:
  unit: none                       # no unit test runner yet (a11y audits only)
  e2e: playwright                  # @playwright/test present

hooks:
  tool: auto                       # auto: node → lefthook

lsp:
  enabled: true                    # set ENABLE_LSP_TOOL=1 in .env for richer code intelligence

deploy:
  platform: netlify                # custom — Netlify (not in vercel/railway/fly/aws enum)
  secrets_cmd: "netlify env:set"   # command to add a secret to Netlify

docs:
  framework: none                  # plain Markdown (docs/ + memory-bank/), no docs framework
  path: docs                       # path to documentation directory
  format: md                       # md | mdx

# Commands used by agents to perform standard tasks.
commands:
  dev: npm run dev
  build: npm run build
  test: npm run audit:a11y         # accessibility audit (no unit tests yet)
  lint: npm run lint
  typecheck: npx astro check
  format: "npx eslint . --fix"
  install: npm install
  # Worktree lifecycle hooks (generated by /env-setup retrofit).
  worktree_setup: tools/worktree-setup.sh
  worktree_teardown: tools/worktree-teardown.sh

# Directories where dev-core agents write structured artifacts.
artifacts:
  analyses: artifacts/analyses
  specs: artifacts/specs
  frames: artifacts/frames
  plans: artifacts/plans

# Paths to standards documentation referenced by agents.
standards:
  backend: docs/standards/backend-patterns.md
  frontend: docs/standards/frontend-patterns.md
  testing: docs/standards/testing.md
  code_review: docs/standards/code-review.md
  architecture: docs/architecture/
  configuration: docs/configuration.md
  deployment: docs/guides/deployment.md
  troubleshooting: docs/guides/troubleshooting.md
  issue_management: docs/processes/issue-management.md
  dev_process: docs/processes/dev-process.md
  contributing: docs/contributing.md
